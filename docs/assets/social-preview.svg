<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#FDBA74"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="54" y="52" width="1172" height="536" rx="28" fill="#111827" stroke="#334155" stroke-width="2"/>

  <rect x="88" y="86" width="172" height="42" rx="21" fill="#1E293B"/>
  <text x="174" y="113" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#E2E8F0">SDD Framework</text>

  <text x="88" y="190" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="700" fill="#F8FAFC">
