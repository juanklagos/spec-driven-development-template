  </text>

  <rect x="88" y="430" width="260" height="86" rx="22" fill="#0F172A" stroke="#334155"/>
  <text x="118" y="468" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#F8FAFC">Template Root</text>
  <text x="118" y="498" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#94A3B8">canonical framework</text>

  <rect x="374" y="430" width="260" height="86" rx="22" fill="#0F172A" stroke="#334155"/>
  <text x="404" y="468" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#F8FAFC">sdd-core</text>
  <text x="404" y="498" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#94A3B8">typed workflow logic</text>

  <rect x="660" y="430" width="260" height="86" rx="22" fill="#0F172A" stroke="#334155"/>
  <text x="690" y="468" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#F8FAFC">sdd-mcp</text>
  <text x="690" y="498" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#94A3B8">tools, resources, prompts</text>

  <rect x="946" y="430" width="246" height="86" rx="22" fill="url(#panel)"/>
  <text x="976" y="468" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#111827">./www/&lt;project-name&gt;</text>
  <text x="976" y="498" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#1F2937">runnable target project</text>

  <text x="88" y="560" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#94A3B8">
