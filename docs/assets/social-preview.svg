  </text>
  <text x="88" y="252" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="700" fill="#F8FAFC">
    with AI + MCP
  </text>

  <text x="88" y="320" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#CBD5E1">
