# Packaging for SDD Desk — spec 023 R8.
#
# The icon comes from build/icon.png, the single 1024px master that
# scripts/build-icon.mjs renders from build/icon.svg. electron-builder derives
# the .icns and .ico from it, so the brand mark has one source and never drifts
# between platforms.
#
# Signing is configured here but its credentials are not: `mac.notarize` and the
# Windows certificate come from the environment in CI (R10). A local build
# without them produces a working, unsigned app — useful for development, and
# NOT what gets published, because an unsigned build moves the cost onto users
# in the form of Gatekeeper and SmartScreen warnings they cannot diagnose.

appId: com.juanklagos.sdd-desk
productName: SDD Desk
copyright: Copyright © 2026 Juan Carlos Alvarez Lagos

directories:
  output: release
  buildResources: build

# The app is the compiled main process plus its runtime dependencies. Source,
# the icon working files and the packager's own output stay out.
files:
  - dist/**/*
  - package.json
  - "!**/*.map"

# The builder frontend is served by the embedded server from inside
# @juanklagos/sdd-mcp (dist/builder-ui), so it needs no separate entry here:
# packaging the dependency packages the UI with it.
asar: true

mac:
  category: public.app-category.developer-tools
  icon: build/icon.png
  target:
    - target: dmg
      arch: [arm64, x64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # notarize: set by CI once the Apple credentials exist.

# Artifact names carry no version and no spaces, on purpose.
#
# GitHub serves `releases/latest/download/<name>`, which redirects to the newest
# release — but only if <name> is spelled the same in every release. Putting
# ${version} in the file name makes every download button on the site expire on
# the next tag, and a space makes the URL need escaping in every link that
# points at it. The version belongs on the release page, which shows it anyway.
dmg:
  artifactName: SDD-Desk-mac-${arch}.${ext}

win:
  icon: build/icon.png
  # x64 only. Windows on ARM runs x64 binaries through emulation, so a separate
  # arm64 installer buys very little here and costs a second artifact whose
  # exact file name cannot be verified from a Mac — and an unverified file name
  # is a 404 behind a download button. One arch means one knowable URL.
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: SDD-Desk-windows-setup.${ext}

linux:
  icon: build/icons
  category: Development
  synopsis: The SDD Builder in its own window
  # No ${arch} here, and a single architecture on purpose. electron-builder
  # spells x64 as "x86_64" for AppImage and as "amd64" for .deb, following each
  # format's own convention — so a templated name produces a file whose URL the
  # download page cannot predict, and a wrong guess is a 404 on a download
  # button. Pinning the name makes the published URL knowable.
  artifactName: SDD-Desk-linux.${ext}
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  # Flathub has banned AI-assisted code since 2026-05-29, so the store channel
  # with the widest Linux reach is closed to this project. AppImage and .deb are
  # the whole Linux story here, deliberately.

# This block configures the UPDATER, not the publisher.
#
# The workflow always runs `--publish never` and uploads with `gh` instead,
# because electron-builder's GitHub publisher derives the release tag from
# `version` (`v${version}`) and ignores the git tag that triggered the build —
# which put a `v0.1.0` release next to the template's own v2.x history and read
# like a downgrade of the whole project.
#
# `generic` rather than `github` for the same reason (R9): the GitHub provider
# looks up the repository's "latest" release, and the desktop app deliberately
# does not own that pointer. Pointing straight at the fixed `desk-latest` tag is
# what lets the updater find `latest-mac.yml` without desk having to become the
# headline release.
publish:
  provider: generic
  url: https://github.com/juanklagos/spec-driven-development-template/releases/download/desk-latest
