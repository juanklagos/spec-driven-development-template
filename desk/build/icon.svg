<!--
  App icon for SDD Desk. Derived from docs/assets/logo.svg — same monogram, same
  geometry, same monochrome brand (spec 018).

  One deliberate difference: the brand mark carves the S out of the tile and
  lets the background show through, and its ink flips with prefers-color-scheme.
  Neither works for an application icon. A Dock or taskbar icon is a static
  raster composited over a wallpaper nobody chose for us: the cut-out would show
  the desktop through the letter, and on a dark wallpaper a dark tile with a
  dark-ish hole stops being a shape at all.

  So the icon keeps the monogram and inverts the treatment: ink tile, light
  glyph. Same two brand colours, no third one invented, and green stays reserved
  for state rather than becoming a brand colour (spec 018 is explicit about it).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="1024" height="1024" role="img" aria-label="SDD Desk">
  <rect x="6" y="6" width="84" height="84" rx="20" fill="#0f172a"/>
  <g fill="#f8fafc">
    <rect x="24" y="18" width="48" height="13" rx="6.5"/>
    <rect x="24" y="41.5" width="48" height="13" rx="6.5"/>
    <rect x="24" y="65" width="48" height="13" rx="6.5"/>
    <rect x="24" y="18" width="13" height="36.5" rx="6.5"/>
    <rect x="59" y="41.5" width="13" height="36.5" rx="6.5"/>
  </g>
</svg>
