version: 1
name: spec-driven-development-template-policy

context:
  repository: https://github.com/juanklagos/spec-driven-development-template
  purpose_en: Starter template to bootstrap SDD projects with low friction.
  purpose_es: Plantilla base para iniciar proyectos SDD con baja fricción.
  execution_workspace_en: Prefer www/<project-name>/ as the recommended default workspace for runnable target projects.
  execution_workspace_es: Prefiere www/<nombre-proyecto>/ como espacio de trabajo recomendado por defecto para proyectos ejecutables.

execution_root:
  required_for_target_execution: true
  default_workspace_parent: www
  constrained_to_current_chat_workspace: false
  allow_external_target_paths: true
  if_target_inside_template_use_default_workspace: true
  recommended_not_required: true
  default_creation_command: ./scripts/create-www-project.sh <project-name> <assistant>
  default_scaffold_profile: recommended
  minimal_scaffold_flag: --minimal-template
  full_scaffold_flag: --full-template
  do_not_implement_in_template_root: true

user_consent:
  required_before_execution_after_spec_approval: true
  required_before_gate_execution_when_specs_exist: true
  # Enforced per spec: an approved spec needs its own `[spec:<id>]` line in the
  # consent log. Recording consent once no longer opens the gate for every spec
  # approved afterwards. Implemented in scripts/check-sdd-gate.sh and in
  # checkGate (packages/sdd-core/src/index.ts) — the two must stay in sync.
  granularity: per_spec
  entry_format: "[<timestamp>] [spec:<NNN-slug>] <summary>"
  # Migration, never a hard break: a log written before per-spec entries
  # existed (any non-blank line with no `[spec:` marker) still covers the whole
  # workspace, but the gate downgrades it to a warning naming the exact command.
  legacy_free_text_entries: warn
  log_file: .sdd/user-consent.log
  command: ./scripts/confirm-user-consent.sh --spec <NNN-slug> "User approved scope"

hard_stop:
  no_code_before_spec_approved: true
  no_code_before_plan_consistent: true

gates:
  required_order:
    - idea
    - spec
    - plan
    - tasks
    - implement
    - validate
    - logbook
  validate_commands:
    - ./scripts/validate-sdd.sh . --strict
    - ./scripts/check-sdd-gate.sh .

required_files:
  - AGENTS.md
  - AI_START_HERE.md
  - INSTRUCTIONS.md
  - template-context/core-instructions/AGENT_OPERATING_SYSTEM.md
  - .cursorrules
  - .clauderules
  - CLAUDE.md
  - GEMINI.md
  - WINDSURF.md
  - AIDER.md
  - ROO.md
  - .github/copilot-instructions.md
  - scripts/confirm-user-consent.sh

agent_rule_markers:
  canonical_source: template-context/core-instructions/AGENT_OPERATING_SYSTEM.md
  hard_stop_phrase_en: No code before approved spec and consistent plan.
  hard_stop_phrase_es: No hay código sin spec aprobada y plan consistente.
  execution_root_phrase_en: Use www/<project-name>/ as the recommended default workspace for runnable code.
  execution_root_phrase_es: Usa www/<nombre-proyecto>/ como espacio de trabajo recomendado por defecto para código ejecutable.
  workspace_scope_phrase_en: If the target project lives inside this template, keep it inside the current chat workspace folder under www/.
  workspace_scope_phrase_es: Si el proyecto destino vive dentro de este template, mantenlo dentro de la carpeta actual del chat bajo www/.

decision_log:
  path: bitacora/decisiones
  template: bitacora/templates/DECISION_TEMPLATE.md
  command: /sdd:decision
  filename_pattern: YYYY-MM-DD-<slug>.md
  record_when_any:
    - chose_between_real_alternatives
    - expensive_to_reverse
    - future_reader_would_ask_why
  require_when_to_revisit_section: true
  require_sourced_rationale: true
  never_invent_rationale_or_dates: true

session_output_contract:
  - objective
  - active_spec
  - changes
  - validation
  - risks
  - decision_recorded
  - next_step
