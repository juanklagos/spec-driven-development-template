version: 1
name: spec-driven-development-template-policy

context:
  repository: https://github.com/juanklagos/spec-driven-development-template
  purpose_en: Starter template to bootstrap SDD projects with low friction.
  purpose_es: Plantilla base para iniciar proyectos SDD con baja fricción.
  execution_workspace_en: Use www/<project-name>/ for runnable target projects.
  execution_workspace_es: Usa www/<nombre-proyecto>/ para proyectos ejecutables.

execution_root:
  required_for_target_execution: true
  default_workspace_parent: www
  constrained_to_current_chat_workspace: true
  default_creation_command: ./scripts/create-www-project.sh <project-name> <assistant>
  default_scaffold_profile: recommended
  minimal_scaffold_flag: --minimal-template
  full_scaffold_flag: --full-template
  do_not_implement_in_template_root: true

user_consent:
  required_before_execution_after_spec_approval: true
  required_before_gate_execution_when_specs_exist: true
  log_file: .sdd/user-consent.log
  command: ./scripts/confirm-user-consent.sh "User approved scope"

hard_stop:
  no_code_before_spec_approved: true
  no_code_before_plan_consistent: true

gates:
  required_order:
    - idea
    - spec
    - plan
    - tasks
    - implement
    - validate
    - logbook
  validate_commands:
    - ./scripts/validate-sdd.sh . --strict
    - ./scripts/check-sdd-gate.sh .

required_files:
  - AGENTS.md
  - AI_START_HERE.md
  - INSTRUCTIONS.md
  - template-context/core-instructions/AGENT_OPERATING_SYSTEM.md
  - .cursorrules
  - .clauderules
  - CLAUDE.md
  - GEMINI.md
  - WINDSURF.md
  - AIDER.md
  - ROO.md
  - .github/copilot-instructions.md
  - scripts/confirm-user-consent.sh

agent_rule_markers:
  canonical_source: template-context/core-instructions/AGENT_OPERATING_SYSTEM.md
  hard_stop_phrase_en: No code before approved spec and consistent plan.
  hard_stop_phrase_es: No hay código sin spec aprobada y plan consistente.
  execution_root_phrase_en: Use www/<project-name>/ as execution root for runnable code.
  execution_root_phrase_es: Usa www/<nombre-proyecto>/ como raíz de ejecución para código ejecutable.
  workspace_scope_phrase_en: Keep runnable projects inside the current chat workspace folder.
  workspace_scope_phrase_es: Mantén proyectos ejecutables dentro de la carpeta actual del chat.

session_output_contract:
  - objective
  - active_spec
  - changes
  - validation
  - risks
  - next_step
