name: Validate MCP

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  mcp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: MCP stdio smoke test
        run: npm run mcp:smoke

      - name: MCP HTTP smoke test
        run: npm run mcp:http:smoke

      - name: MCP integration test
        run: npm run mcp:test

      - name: npm package smoke test (packed tarballs)
        run: npm run mcp:pack:smoke

      # builder/ is a standalone Vite app with its own lockfile: the root
      # workspaces glob is packages/* only, so `npm run typecheck` / `npm run
      # build` above never reach it. Without this step CI asserts things about
      # builder/src (the mirror asserts in scripts/test-mcp-integration.mjs read
      # those files as text) while never compiling them.
      # `npm run build` in builder/ is `tsc --noEmit && vite build`, so one
      # command covers both typecheck and build.
      - name: Builder typecheck + build
        working-directory: builder
        run: npm ci && npm run build
