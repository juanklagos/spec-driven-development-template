name: Check Markdown Links

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  local-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check local markdown links (offline)
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >-
            --offline
            --no-progress
            --format detailed
            "**/*.md"
