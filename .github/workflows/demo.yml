name: demo-gif

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  vhs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The tape creates a throwaway spec inside the CI checkout only;
      # nothing but the regenerated GIF is committed back.
      - uses: charmbracelet/vhs-action@v2
        with:
          path: demo.tape

      - name: Commit regenerated demo GIF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/assets/demo.gif
          if git diff --cached --quiet; then
            echo "Demo GIF unchanged"
          else
            git commit -m "docs: regenerate demo.gif from demo.tape"
            git push
          fi
