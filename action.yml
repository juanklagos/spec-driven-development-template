name: 'SDD Validate'
description: 'No code before approved spec and consistent plan — validates SDD structure, policy, and gate in CI.'
author: 'Juan Klagos'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  path:
    description: 'Project root to validate (repo root, or a subfolder containing the SDD workspace)'
    required: false
    default: '.'
  strict:
    description: 'Run structure validation in strict mode (true/false)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Run SDD validation (structure + policy + gate)
      shell: bash
      run: |
        set -euo pipefail
        TARGET="${{ inputs.path }}"

        # Resolve the workspace FIRST and fail closed.
        # An SDD workspace is sdd.policy.yaml + idea/ + specs/ + bitacora/,
        # either at the target itself (standalone/full layout) or in its compact
        # spec/ sidecar. Without this check the run fell through to the scripts
        # bundled with the action, which then resolved *the action's own
        # checkout* — a complete workspace with approved specs and a tracked
        # .sdd/user-consent.log — so a consumer with no SDD workspace at all got
        # three green groups and a passing gate.
        is_sdd_root() {
          [ -f "$1/sdd.policy.yaml" ] && [ -d "$1/idea" ] && [ -d "$1/specs" ] && [ -d "$1/bitacora" ]
        }

        if is_sdd_root "$TARGET/spec"; then
          SDD_ROOT="$TARGET/spec"
        elif is_sdd_root "$TARGET"; then
          SDD_ROOT="$TARGET"
        else
          echo "::error::No SDD workspace found under $TARGET. Expected sdd.policy.yaml + idea/ + specs/ + bitacora/ there or in $TARGET/spec (compact sidecar). Run scripts/install-spec-sidecar.sh, or set the action's 'path' input to the folder that holds the workspace."
          exit 1
        fi
        echo "SDD workspace: $SDD_ROOT"

        # Prefer the scripts shipped with the workspace so a project pinned to
        # an older template keeps validating against its own rules.
        #
        # That choice is recorded in bitacora/decisiones/2026-07-21-action-usa-
        # los-scripts-del-consumidor.md and it stands: whoever can edit the CI
        # can delete this action, so it was never a security boundary, and
        # imposing our scripts would change a third party's validation rules
        # between two commits of `uses: ...@main`.
        #
        # What follows is the mitigation that decision DECLARES — "a stale
        # sidecar is detectable" — and which, until now, nothing implemented:
        # install-spec-sidecar.sh stamped .sdd/TEMPLATE_VERSION and no code ever
        # read it. Its own revisit trigger fired when spec 012 fixed a
        # CORRECTNESS fail-open (a greedy regex read `Pendiente` as approved), so
        # a workspace pinned below 2.1.0 reports green on specs nobody approved.
        #
        # Advisory only. Never touches the exit code: turning a version gap into
        # a broken build punishes the consumer for not upgrading, which is the
        # friction the sidecar exists to avoid.
        if [ -f "$SDD_ROOT/scripts/validate-sdd.sh" ]; then
          SCRIPTS="$SDD_ROOT/scripts"

          read_version_field() {
            [ -f "$1" ] || return 1
            sed -n 's/^template_version=\(.*\)$/\1/p' "$1" | head -n 1
          }
          ACTION_VERSION="$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "${{ github.action_path }}/package.json" 2>/dev/null | head -n 1)"
          WORKSPACE_VERSION="$(read_version_field "$SDD_ROOT/.sdd/TEMPLATE_VERSION" || true)"

          if [ -z "$WORKSPACE_VERSION" ] || [ "$WORKSPACE_VERSION" = "unknown" ]; then
            echo "::warning::This workspace has no readable .sdd/TEMPLATE_VERSION, so its template version cannot be determined. It is running its own copy of the SDD scripts, which may predate fixes in this action. Refresh with: ./scripts/install-spec-sidecar.sh ."
          elif [ -n "$ACTION_VERSION" ] && [ "$WORKSPACE_VERSION" != "$ACTION_VERSION" ]; then
            # Portable numeric compare. `sort -V` is GNU-only and absent on macOS,
            # where contributors run these scripts locally.
            OLDEST="$(printf '%s\n%s\n' "$WORKSPACE_VERSION" "$ACTION_VERSION" | sort -t. -k1,1n -k2,2n -k3,3n | head -n 1)"
            if [ "$OLDEST" = "$WORKSPACE_VERSION" ]; then
              echo "::warning::This workspace runs SDD scripts from template $WORKSPACE_VERSION while this action is $ACTION_VERSION. Your gate is validating against older rules, and versions before 2.1.0 contain a fail-open where an unapproved spec could read as approved. Your scripts are used on purpose (you choose when to upgrade) — refresh them with: ./scripts/install-spec-sidecar.sh ."
            fi
          fi
        else
          SCRIPTS="${{ github.action_path }}/scripts"
          echo "No SDD scripts in the workspace; using the scripts bundled with the action."
        fi

        STRICT_FLAG=""
        if [ "${{ inputs.strict }}" = "true" ]; then
          STRICT_FLAG="--strict"
        fi

        echo "::group::validate-sdd"
        bash "$SCRIPTS/validate-sdd.sh" "$SDD_ROOT" $STRICT_FLAG
        echo "::endgroup::"

        echo "::group::check-sdd-policy"
        bash "$SCRIPTS/check-sdd-policy.sh" "$SDD_ROOT"
        echo "::endgroup::"

        echo "::group::check-sdd-gate"
        bash "$SCRIPTS/check-sdd-gate.sh" "$SDD_ROOT"
        echo "::endgroup::"
